<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Design Challenge</title>
    <meta name="title" content="Vibe Design Challenge" />
    <meta name="description" content="A daily cyber-retro design challenge generator. Get constraints, color palettes, and wild prompts to level up your design skills." />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meetshah0656.github.io/Vibe-Design/" />
    <meta property="og:title" content="Vibe Design Challenge" />
    <meta property="og:description" content="A daily cyber-retro design challenge generator. Get constraints, color palettes, and wild prompts to level up your design skills." />
    <meta property="og:image" content="https://meetshah0656.github.io/Vibe-Design/preview-image.png" />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://meetshah0656.github.io/Vibe-Design/" />
    <meta property="twitter:title" content="Vibe Design Challenge" />
    <meta property="twitter:description" content="A daily cyber-retro design challenge generator. Get constraints, color palettes, and wild prompts to level up your design skills." />
    <meta property="twitter:image" content="https://meetshah0656.github.io/Vibe-Design/preview-image.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="retro.css">
  </head>

  <body>
    <h2 class="title">Vibe Design Challenge Generator</h2>
    <div id="dailyHeader" class="subtitle"></div>

    <div class="control-card">
      <button id="generate">Generate challenge</button>

      <select id="mode">
        <option value="free">Free mode</option>
        <option value="strict">Strict mode</option>
        <option value="type">Typography only</option>
      </select>

      <select id="context">
        <option value="poster">Poster design</option>
        <option value="brand">Brand identity</option>
        <option value="social">Social media creative</option>
        <option value="motion">Motion / reel cover</option>
      </select>

      <label>
        <input type="checkbox" id="dailyMode" />
        Daily challenge
      </label>
    </div>

    <div class="control-card">
      <button id="share" class="secondary">Share challenge</button>
      <button id="download" class="secondary">Download brief image</button>
    </div>

    <div class="section">
      <h3>Color palette</h3>
      <div id="palette" class="palette"></div>
    </div>

    <div class="section">
      <h3>Idea inspiration</h3>
      <div id="trend">—</div>
    </div>

    <div class="section">
      <h3>Fonts</h3>
      <div id="fonts">—</div>
    </div>

    <div class="section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
        <h3 style="margin: 0;">Design challenge</h3>
        <button id="copyBrief" class="secondary" style="padding: 6px 12px; font-size: 11px;">Copy Text</button>
      </div>
      <div id="challenge">—</div>
    </div>

    <div class="section">
      <h3>History</h3>
      <div id="history">—</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
